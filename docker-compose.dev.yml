version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: swasthai
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d swasthai || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: artifacts/api-server/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 8080
      DATABASE_URL: postgresql://postgres:postgres@db:5432/swasthai
      AI_INTEGRATIONS_OPENAI_BASE_URL: https://api.openai.com/v1
      AI_INTEGRATIONS_OPENAI_API_KEY: demo-key
      AI_INTEGRATIONS_ANTHROPIC_BASE_URL: https://api.anthropic.com
      AI_INTEGRATIONS_ANTHROPIC_API_KEY: demo-key
      AI_INTEGRATIONS_GEMINI_BASE_URL: https://generativelanguage.googleapis.com
      AI_INTEGRATIONS_GEMINI_API_KEY: demo-key
      CORS_ORIGINS: "*"
      RATE_LIMIT_MAX: 1000
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  doctor:
    build:
      context: .
      dockerfile: artifacts/doctor/Dockerfile
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/doctor/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  swasthai:
    build:
      context: .
      dockerfile: artifacts/swasthai/Dockerfile
      args:
        EXPO_PUBLIC_DOMAIN: localhost
    restart: unless-stopped
    ports:
      - "19000:80"
    depends_on:
      - api
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  db-data:
