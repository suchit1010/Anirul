kind = "mobile"
previewPath = "/"
title = "SwasthAI"
version = "1.0.0"
id = "artifacts/swasthai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20759

[services.development]
run = "pnpm --filter @workspace/swasthai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/swasthai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/swasthai", "run", "serve" ]

[services.env]
PORT = "20759"
BASE_PATH = "/"
